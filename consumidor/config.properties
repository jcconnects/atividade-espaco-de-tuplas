# Nível 2A — Modificação A: Prioridade de tarefas
#
# false → consumidor retira qualquer tarefa disponível (comportamento padrão)
# true  → consumidor tenta buscar tarefas de alta prioridade (prioridade=1) primeiro;
#          se não encontrar em 2 segundos, aceita qualquer tarefa
#
# Para o Nível 2A, altere o valor abaixo de false para true e execute:
#   docker compose up --build
buscar_alta_prioridade_primeiro=false
